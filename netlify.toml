[build]
  command = "npm run build"
  publish = "build"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/json"

# Legacy URL redirects (301 for SEO — tells crawlers these moved permanently)
[[redirects]]
  from = "/personal-life"
  to = "/about-intro"
  status = 301
  force = true

[[redirects]]
  from = "/career"
  to = "/experience-intro"
  status = 301
  force = true

[[redirects]]
  from = "/education"
  to = "/tech-intro"
  status = 301
  force = true

[[redirects]]
  from = "/projects"
  to = "/projects-intro"
  status = 301
  force = true

[[redirects]]
  from = "/contactMe"
  to = "/contact"
  status = 301
  force = true

[[redirects]]
  from = "/about"
  to = "/about-intro"
  status = 301
  force = true

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
