      <h1>Joshua Garst — Full-Stack Software Engineer</h1>
      <p><strong>Location:</strong> Bentonville, Arkansas (Northwest Arkansas)</p>
      <p><strong>Role:</strong> Software Developer II at Sharp Hue (Fayetteville, Arkansas)</p>
      <p>Joshua Garst is a full-stack software engineer with 3+ years of professional experience in .NET, C#, ASP.NET MVC, Azure cloud services, and JavaScript. At Sharp Hue he builds and maintains enterprise CRM workflows on Microsoft Dynamics 365, Azure-hosted infrastructure, and data-driven internal tools used by real clients in production.</p>

      <h2>Tech Stack</h2>
      <p><strong>Languages:</strong> C#, JavaScript, TypeScript, Python, SQL, HTML5, CSS3, PHP.</p>
      <p><strong>Backend:</strong> ASP.NET MVC, .NET Minimal APIs, Entity Framework, Razor Pages, Node.js, Express, Django, Spring Boot.</p>
      <p><strong>Frontend:</strong> React, Three.js, React Three Fiber, jQuery, Knockout.js, EJS.</p>
      <p><strong>Databases:</strong> Microsoft SQL Server, MongoDB, PostgreSQL, SQLite.</p>
      <p><strong>Cloud (Azure):</strong> Azure Functions, Azure Blob Storage, Azure Application Insights.</p>
      <p><strong>Enterprise:</strong> Microsoft Dynamics 365 CRM.</p>
      <p><strong>Tooling:</strong> Docker, CI/CD pipelines, Git, Visual Studio, VS Code, Vite, Webpack.</p>

      <h2>Projects</h2>
      <p><strong>Enterprise work at Sharp Hue:</strong> Dynamics 365 CRM workflows managing customer interactions, .NET Minimal APIs, Azure Functions, CI/CD pipelines, and reporting dashboards.</p>
      <p><strong>CyberDefense:</strong> Browser-based tower defense game in vanilla HTML, CSS, and JavaScript — no framework, no build step.</p>
      <p><strong>Date Night Organizer:</strong> Full-stack scheduling app using Node, Express, EJS server-rendered views, and MongoDB.</p>
      <p><strong>Movie App:</strong> MERN stack application (MongoDB, Express, React, Node).</p>
      <p><strong>The Cube:</strong> Interactive 3D experiment built with React Three Fiber on top of Three.js.</p>
      <p><strong>This portfolio site:</strong> React 19, Vite, React Three Fiber, React Router, deployed on Netlify. Content is driven by a passage-graph config for easy updates.</p>

      <h2>Background</h2>
      <p>Joshua transitioned into software engineering through a six-month coding boot camp in 2021, completed while working full-time. He joined Sharp Hue as an apprentice and has since worked up to Software Developer II. Before software, his work was more hands-on — including farming and regenerative agriculture. He still helps with his grandfather's orchard in Gravette, Arkansas.</p>

      <h2>Engineering Philosophy</h2>
      <p>Favors simple, readable code over clever abstractions. Prefers editing existing patterns to inventing new ones. Writes comments only when the <em>why</em> is non-obvious. Values shipping over perfection, but not over correctness.</p>
